version: '3.8'

services:
  bot:
    build: .
    command: bash -c "python src/main.py"
    container_name: oasis_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./downloads:/app/downloads
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
